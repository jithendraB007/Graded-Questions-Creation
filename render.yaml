services:
  - type: web
    name: ga-question-generator
    runtime: python
    buildCommand: >-
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build && cd ..
    startCommand: uvicorn backend.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: graded-questions-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: graded-questions-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: graded-questions-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: graded-questions-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: graded-questions-db
          property: password

databases:
  - name: graded-questions-db
    databaseName: questions_db
    user: postgres
    plan: free
